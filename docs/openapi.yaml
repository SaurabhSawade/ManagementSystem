openapi: 3.0.3
info:
  title: College Management Backend API
  version: 3.0.0
  description: |
    Role-grouped API design for the college management backend.

servers:
  - url: http://localhost:4000
    description: Local development

security:
  - bearerAuth: []

tags:
  - name: Auth
  - name: Profile
  - name: Admin
  - name: Teacher
  - name: Student
  - name: Accountant
  - name: Library

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Request successful
        type:
          type: string
          example: SUCCESS
        data:
          nullable: true

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 400
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Validation error
        type:
          type: string
          example: VALIDATION_ERROR
        data:
          nullable: true

paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: superadmin
                password:
                  type: string
                  example: SuperAdmin@123
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh-token-example
      responses:
        "200":
          description: Token refreshed

  /api/v1/auth/forgot-password/request-otp:
    post:
      tags: [Auth]
      summary: Request OTP for password reset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: superadmin@example.com
      responses:
        "200":
          description: OTP sent

  /api/v1/auth/forgot-password/verify-otp:
    post:
      tags: [Auth]
      summary: Verify OTP and reset password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, otp, newPassword]
              properties:
                email:
                  type: string
                  format: email
                  example: superadmin@example.com
                otp:
                  type: string
                  example: "123456"
                newPassword:
                  type: string
                  example: NewStrongPassword@123
      responses:
        "200":
          description: Password reset successful

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /api/v1/auth/reset-password:
    post:
      tags: [Auth]
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword:
                  type: string
                  example: SuperAdmin@123
                newPassword:
                  type: string
                  example: NewStrongPassword@123
      responses:
        "200":
          description: Password changed

  /api/v1/profile/me:
    get:
      tags: [Profile]
      summary: Get current user profile
      responses:
        "200":
          description: Profile fetched

  /api/v1/admin/users:
    post:
      tags: [Admin]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, roles]
              properties:
                username:
                  type: string
                  example: student01
                email:
                  type: string
                  format: email
                  example: student01@college.edu
                phone:
                  type: string
                  example: "9876543210"
                password:
                  type: string
                  example: Student@123
                roles:
                  type: array
                  items:
                    type: string
                    enum: [SUPER_ADMIN, ADMIN, STUDENT, TEACHER, ACCOUNTANT, LIBRARY_STAFF]
                  example: [STUDENT]
                studentProfile:
                  type: object
                  properties:
                    rollNumber:
                      type: string
                      example: STU-2026-001
                    classRoomId:
                      type: string
                      format: uuid
                      example: 11111111-1111-1111-1111-111111111111
                    guardianName:
                      type: string
                      example: John Doe
                teacherProfile:
                  type: object
                  properties:
                    employeeId:
                      type: string
                      example: TCH-2026-001
                    department:
                      type: string
                      example: Computer Science
      responses:
        "201":
          description: User created

  /api/v1/admin/users/block-status/{userId}:
    patch:
      tags: [Admin]
      summary: Block or unblock user
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                isBlocked:
                  type: boolean
                  example: true
                reason:
                  type: string
                  example: Violation of policy
      responses:
        "200":
          description: User block status updated

  /api/v1/admin/users/reset-password/{userId}:
    patch:
      tags: [Admin]
      summary: Force reset password for a user
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [newPassword]
              properties:
                newPassword:
                  type: string
                  example: Reset@123
      responses:
        "200":
          description: Password reset by admin

  /api/v1/admin/users/grant-admin/{userId}:
    patch:
      tags: [Admin]
      summary: Grant admin role
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Admin role granted

  /api/v1/admin/users/revoke-admin/{userId}:
    patch:
      tags: [Admin]
      summary: Revoke admin role
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Admin role revoked

  /api/v1/admin/students:
    get:
      tags: [Admin]
      summary: List students
      responses:
        "200":
          description: Students list

  /api/v1/admin/students/{studentId}:
    get:
      tags: [Admin]
      summary: Get student
      parameters:
        - in: path
          name: studentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Student details
    patch:
      tags: [Admin]
      summary: Update student
      parameters:
        - in: path
          name: studentId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                rollNumber:
                  type: string
                  example: STU-2026-001
                classRoomId:
                  type: string
                  format: uuid
                  example: 11111111-1111-1111-1111-111111111111
                guardianName:
                  type: string
                  example: John Doe
      responses:
        "200":
          description: Student updated
    delete:
      tags: [Admin]
      summary: Delete student
      parameters:
        - in: path
          name: studentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Student deleted

  /api/v1/admin/teachers:
    get:
      tags: [Admin]
      summary: List teachers
      responses:
        "200":
          description: Teachers list

  /api/v1/admin/teachers/{teacherId}:
    get:
      tags: [Admin]
      summary: Get teacher
      parameters:
        - in: path
          name: teacherId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Teacher details
    patch:
      tags: [Admin]
      summary: Update teacher
      parameters:
        - in: path
          name: teacherId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                employeeId:
                  type: string
                  example: TCH-2026-001
                department:
                  type: string
                  example: Computer Science
      responses:
        "200":
          description: Teacher updated
    delete:
      tags: [Admin]
      summary: Delete teacher
      parameters:
        - in: path
          name: teacherId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Teacher deleted

  /api/v1/admin/classrooms:
    get:
      tags: [Admin]
      summary: List classrooms
      responses:
        "200":
          description: Classrooms list
    post:
      tags: [Admin]
      summary: Create classroom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, section]
              properties:
                name:
                  type: string
                  example: Grade 10
                section:
                  type: string
                  example: A
      responses:
        "201":
          description: Classroom created

  /api/v1/admin/classrooms/{classroomId}:
    get:
      tags: [Admin]
      summary: Get classroom
      parameters:
        - in: path
          name: classroomId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Classroom retrieved
    patch:
      tags: [Admin]
      summary: Update classroom
      parameters:
        - in: path
          name: classroomId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Grade 10
                section:
                  type: string
                  example: B
      responses:
        "200":
          description: Classroom updated
    delete:
      tags: [Admin]
      summary: Delete classroom
      parameters:
        - in: path
          name: classroomId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Classroom deleted

  /api/v1/admin/subjects:
    get:
      tags: [Admin]
      summary: List subjects
      responses:
        "200":
          description: Subjects list
    post:
      tags: [Admin]
      summary: Create subject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, code]
              properties:
                name:
                  type: string
                  example: Mathematics
                code:
                  type: string
                  example: MATH101
      responses:
        "201":
          description: Subject created

  /api/v1/admin/subjects/{subjectId}:
    get:
      tags: [Admin]
      summary: Get subject
      parameters:
        - in: path
          name: subjectId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Subject retrieved
    patch:
      tags: [Admin]
      summary: Update subject
      parameters:
        - in: path
          name: subjectId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Advanced Mathematics
                code:
                  type: string
                  example: MATH201
      responses:
        "200":
          description: Subject updated
    delete:
      tags: [Admin]
      summary: Delete subject
      parameters:
        - in: path
          name: subjectId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Subject deleted

  /api/v1/admin/attendance:
    get:
      tags: [Admin]
      summary: Attendance overview
      responses:
        "200":
          description: Attendance records
    post:
      tags: [Admin]
      summary: Mark attendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [studentId, classRoomId, subjectId, date, status]
              properties:
                studentId:
                  type: string
                  format: uuid
                  example: 22222222-2222-2222-2222-222222222222
                classRoomId:
                  type: string
                  format: uuid
                  example: 11111111-1111-1111-1111-111111111111
                subjectId:
                  type: string
                  format: uuid
                  example: 33333333-3333-3333-3333-333333333333
                date:
                  type: string
                  format: date
                  example: 2026-04-28
                status:
                  type: string
                  example: PRESENT
      responses:
        "201":
          description: Attendance marked

  /api/v1/admin/attendance/bulk:
    post:
      tags: [Admin]
      summary: Bulk mark attendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [attendance]
              properties:
                attendance:
                  type: array
                  items:
                    type: object
                    required: [studentId, classRoomId, subjectId, date, status]
                    properties:
                      studentId:
                        type: string
                        format: uuid
                      classRoomId:
                        type: string
                        format: uuid
                      subjectId:
                        type: string
                        format: uuid
                      date:
                        type: string
                        format: date
                      status:
                        type: string
      responses:
        "201":
          description: Attendance bulk created

  /api/v1/admin/attendance/{attendanceId}:
    get:
      tags: [Admin]
      summary: Get attendance
      parameters:
        - in: path
          name: attendanceId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Attendance retrieved
    patch:
      tags: [Admin]
      summary: Update attendance
      parameters:
        - in: path
          name: attendanceId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  example: ABSENT
      responses:
        "200":
          description: Attendance updated

  /api/v1/admin/attendance/stats/{studentId}:
    get:
      tags: [Admin]
      summary: Attendance stats by student
      parameters:
        - in: path
          name: studentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Attendance stats

  /api/v1/admin/marks:
    get:
      tags: [Admin]
      summary: Marks overview
      responses:
        "200":
          description: Marks records
    post:
      tags: [Admin]
      summary: Create marks entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [studentId, classRoomId, subjectId, examId, marks, maxMarks]
              properties:
                studentId:
                  type: string
                  format: uuid
                  example: 22222222-2222-2222-2222-222222222222
                classRoomId:
                  type: string
                  format: uuid
                  example: 11111111-1111-1111-1111-111111111111
                subjectId:
                  type: string
                  format: uuid
                  example: 33333333-3333-3333-3333-333333333333
                examId:
                  type: string
                  format: uuid
                  example: 44444444-4444-4444-4444-444444444444
                marks:
                  type: number
                  example: 78.5
                maxMarks:
                  type: number
                  example: 100
      responses:
        "201":
          description: Marks created

  /api/v1/admin/marks/bulk:
    post:
      tags: [Admin]
      summary: Bulk create marks
      responses:
        "201":
          description: Marks bulk created

  /api/v1/admin/marks/{markId}:
    get:
      tags: [Admin]
      summary: Get mark
      parameters:
        - in: path
          name: markId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Mark retrieved
    patch:
      tags: [Admin]
      summary: Update mark
      parameters:
        - in: path
          name: markId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                marks:
                  type: number
                  example: 88
      responses:
        "200":
          description: Mark updated

  /api/v1/admin/marks/student/{studentId}:
    get:
      tags: [Admin]
      summary: Student marks
      parameters:
        - in: path
          name: studentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Student marks

  /api/v1/admin/exams:
    get:
      tags: [Admin]
      summary: List exams
      responses:
        "200":
          description: Exams list
    post:
      tags: [Admin]
      summary: Create exam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, term, examDate]
              properties:
                name:
                  type: string
                  example: Mid Term Exam
                term:
                  type: string
                  example: Term 1
                examDate:
                  type: string
                  format: date-time
                  example: 2026-06-15T09:00:00Z
      responses:
        "201":
          description: Exam created

  /api/v1/admin/exams/{examId}:
    get:
      tags: [Admin]
      summary: Get exam
      parameters:
        - in: path
          name: examId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Exam retrieved
    patch:
      tags: [Admin]
      summary: Update exam
      parameters:
        - in: path
          name: examId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Exam updated
    delete:
      tags: [Admin]
      summary: Delete exam
      parameters:
        - in: path
          name: examId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Exam deleted

  /api/v1/admin/results:
    get:
      tags: [Admin]
      summary: List results
      responses:
        "200":
          description: Results list

  /api/v1/admin/results/generate:
    post:
      tags: [Admin]
      summary: Generate result
      responses:
        "200":
          description: Result generated

  /api/v1/admin/results/{resultId}:
    get:
      tags: [Admin]
      summary: Get result
      parameters:
        - in: path
          name: resultId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Result retrieved

  /api/v1/admin/results/student/{studentId}:
    get:
      tags: [Admin]
      summary: Student results
      parameters:
        - in: path
          name: studentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Student results

  /api/v1/admin/fees:
    get:
      tags: [Admin]
      summary: List fees
      responses:
        "200":
          description: Fees list
    post:
      tags: [Admin]
      summary: Create fee record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, amount, dueDate]
              properties:
                userId:
                  type: string
                  format: uuid
                  example: 22222222-2222-2222-2222-222222222222
                amount:
                  type: number
                  example: 1500
                dueDate:
                  type: string
                  format: date
                  example: 2026-05-15
      responses:
        "201":
          description: Fee created

  /api/v1/admin/fees/{feeId}:
    get:
      tags: [Admin]
      summary: Get fee
      parameters:
        - in: path
          name: feeId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Fee retrieved
    patch:
      tags: [Admin]
      summary: Update fee
      parameters:
        - in: path
          name: feeId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Fee updated

  /api/v1/admin/fees/mark-paid/{feeId}:
    post:
      tags: [Admin]
      summary: Mark fee as paid
      parameters:
        - in: path
          name: feeId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Fee marked paid

  /api/v1/admin/fees/stats/{userId}:
    get:
      tags: [Admin]
      summary: Fee stats by user
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Fee stats

  /api/v1/admin/books:
    get:
      tags: [Admin]
      summary: List books
      responses:
        "200":
          description: Books list
    post:
      tags: [Admin]
      summary: Add book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, isbn, author, totalCopies]
              properties:
                title:
                  type: string
                  example: Database Systems
                isbn:
                  type: string
                  example: 9780132143190
                author:
                  type: string
                  example: Abraham Silberschatz
                totalCopies:
                  type: integer
                  example: 10
      responses:
        "201":
          description: Book created

  /api/v1/admin/books/{bookId}:
    get:
      tags: [Admin]
      summary: Get book
      parameters:
        - in: path
          name: bookId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Book retrieved
    patch:
      tags: [Admin]
      summary: Update book
      parameters:
        - in: path
          name: bookId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Book updated

  /api/v1/admin/books/issue:
    post:
      tags: [Admin]
      summary: Issue book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bookId, userId, dueDate]
              properties:
                bookId:
                  type: string
                  format: uuid
                  example: 11111111-1111-1111-1111-111111111111
                userId:
                  type: string
                  format: uuid
                  example: 22222222-2222-2222-2222-222222222222
                dueDate:
                  type: string
                  format: date
                  example: 2026-05-15
      responses:
        "200":
          description: Book issued

  /api/v1/admin/books/{bookIssueId}/return:
    post:
      tags: [Admin]
      summary: Return book
      parameters:
        - in: path
          name: bookIssueId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Book returned

  /api/v1/admin/books/issues/list:
    get:
      tags: [Admin]
      summary: List book issues
      responses:
        "200":
          description: Issues list

  /api/v1/admin/books/issues/{bookIssueId}:
    get:
      tags: [Admin]
      summary: Get book issue
      parameters:
        - in: path
          name: bookIssueId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Issue retrieved

  /api/v1/admin/audit:
    get:
