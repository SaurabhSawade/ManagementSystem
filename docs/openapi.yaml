openapi: 3.0.3
info:
  title: College Management Backend API
  version: 3.0.0
  description: |
    Role-grouped API design for college management.

    Common APIs:
    - /api/v1/auth/*
    - /api/v1/profile/me

    Role-grouped APIs:
    - /api/v1/admin/*
    - /api/v1/teacher/*
    - /api/v1/student/*
    - /api/v1/accountant/*
    - /api/v1/library/*

servers:
  - url: http://localhost:4000
    description: Local development

security:
  - bearerAuth: []

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Profile
    description: Common user profile endpoint
  - name: Admin
    description: Admin role endpoints
  - name: Teacher
    description: Teacher role endpoints
  - name: Student
    description: Student role endpoints
  - name: Accountant
    description: Accountant role endpoints
  - name: Library
    description: Library staff role endpoints

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Request successful
        type:
          type: string
          example: SUCCESS
        data:
          nullable: true

    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 400
        success:
          type: boolean
          example: false
        message:
          type: string
        type:
          type: string
          example: VALIDATION_ERROR
        data:
          nullable: true

paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: admin01
                password:
                  type: string
                  example: Admin@123
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      responses:
        "200":
          description: Token refreshed

  /api/v1/auth/forgot-password/request-otp:
    post:
      tags: [Auth]
      summary: Request OTP for password reset
      security: []
      responses:
        "200":
          description: OTP sent

  /api/v1/auth/forgot-password/verify-otp:
    post:
      tags: [Auth]
      summary: Verify OTP and reset password
      security: []
      responses:
        "200":
          description: Password reset successful

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /api/v1/auth/reset-password:
    post:
      tags: [Auth]
      summary: Change password (authenticated user)
      responses:
        "200":
          description: Password changed

  /api/v1/profile/me:
    get:
      tags: [Profile]
      summary: Get current user profile
      description: Single common profile endpoint for all roles.
      responses:
        "200":
          description: Profile fetched

  /api/v1/admin/users:
    post:
      tags: [Admin]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password, roles]
              properties:
                username:
                  type: string
                  example: student01
                email:
                  type: string
                  format: email
                  example: student01@college.edu
                phone:
                  type: string
                  example: "9876543210"
                password:
                  type: string
                  example: Student@123
                roles:
                  type: array
                  items:
                    type: string
                    enum: [SUPER_ADMIN, ADMIN, STUDENT, TEACHER, ACCOUNTANT, LIBRARY_STAFF]
                  example: [STUDENT]
                studentProfile:
                  type: object
                  properties:
                    rollNumber:
                      type: string
                      example: STU-2026-001
                    classRoomId:
                      type: string
                      format: uuid
                      example: 11111111-1111-1111-1111-111111111111
                    guardianName:
                      type: string
                      example: John Doe
                teacherProfile:
                  type: object
                  properties:
                    employeeId:
                      type: string
                      example: TCH-2026-001
                    department:
                      type: string
                      example: Computer Science
      responses:
        "201":
          description: User created

  /api/v1/admin/users/block-status/{userId}:
    patch:
      tags: [Admin]
      summary: Block or unblock user
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: User block status updated

  /api/v1/admin/users/reset-password/{userId}:
    patch:
      tags: [Admin]
      summary: Force reset password for a user
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Password reset by admin

  /api/v1/admin/users/grant-admin/{userId}:
    patch:
      tags: [Admin]
      summary: Grant admin role
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Admin role granted

  /api/v1/admin/users/revoke-admin/{userId}:
    patch:
      tags: [Admin]
      summary: Revoke admin role
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Admin role revoked

  /api/v1/admin/students:
    get:
      tags: [Admin]
      summary: List students
      responses:
        "200":
          description: Students list

  /api/v1/admin/students/{studentId}:
    get:
      tags: [Admin]
      summary: Get student
      parameters:
        - in: path
          name: studentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Student details
    patch:
      tags: [Admin]
      summary: Update student
      parameters:
        - in: path
          name: studentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Student updated
    delete:
      tags: [Admin]
      summary: Delete student
      parameters:
        - in: path
          name: studentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Student deleted

  /api/v1/admin/teachers:
    get:
      tags: [Admin]
      summary: List teachers
      responses:
        "200":
          description: Teachers list

  /api/v1/admin/classrooms:
    get:
      tags: [Admin]
      summary: List classrooms
      responses:
        "200":
          description: Classrooms list
    post:
      tags: [Admin]
      summary: Create classroom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, section]
              properties:
                name:
                  type: string
                  example: Grade 10
                section:
                  type: string
                  example: A
      responses:
        "201":
          description: Classroom created

  /api/v1/admin/subjects:
    get:
      tags: [Admin]
      summary: List subjects
      responses:
        "200":
          description: Subjects list
    post:
      tags: [Admin]
      summary: Create subject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, code]
              properties:
                name:
                  type: string
                  example: Mathematics
                code:
                  type: string
                  example: MATH101
      responses:
        "201":
          description: Subject created

  /api/v1/admin/attendance:
    get:
      tags: [Admin]
      summary: Attendance overview
      responses:
        "200":
          description: Attendance records
    post:
      tags: [Admin]
      summary: Mark attendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [studentId, subjectId, date, status]
              properties:
                studentId:
                  type: string
                  format: uuid
                  example: 22222222-2222-2222-2222-222222222222
                subjectId:
                  type: string
                  format: uuid
                  example: 33333333-3333-3333-3333-333333333333
                date:
                  type: string
                  format: date
                  example: 2026-04-28
                status:
                  type: string
                  example: PRESENT
      responses:
        "201":
          description: Attendance marked

  /api/v1/admin/marks:
    get:
      tags: [Admin]
      summary: Marks overview
      responses:
        "200":
          description: Marks records
    post:
      tags: [Admin]
      summary: Create marks entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [studentId, classRoomId, subjectId, examId, marks, maxMarks]
              properties:
                studentId:
                  type: string
                  format: uuid
                  example: 22222222-2222-2222-2222-222222222222
                classRoomId:
                  type: string
                  format: uuid
                  example: 11111111-1111-1111-1111-111111111111
                subjectId:
                  type: string
                  format: uuid
                  example: 33333333-3333-3333-3333-333333333333
                examId:
                  type: string
                  format: uuid
                  example: 44444444-4444-4444-4444-444444444444
                marks:
                  type: number
                  example: 78.5
                maxMarks:
                  type: number
                  example: 100
      responses:
        "201":
          description: Marks created

  /api/v1/admin/exams:
    get:
      tags: [Admin]
      summary: List exams
      responses:
        "200":
          description: Exams list
    post:
      tags: [Admin]
      summary: Create exam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, term, examDate]
              properties:
                name:
                  type: string
                  example: Mid Term Exam
                term:
                  type: string
                  example: Term 1
                examDate:
                  type: string
                  format: date-time
                  example: 2026-06-15T09:00:00Z
      responses:
        "201":
          description: Exam created

  /api/v1/admin/results:
    get:
      tags: [Admin]
      summary: List results
      responses:
        "200":
          description: Results list

  /api/v1/admin/results/generate:
    post:
      tags: [Admin]
      summary: Generate results
      responses:
        "200":
          description: Result generated

  /api/v1/admin/fees:
    get:
      tags: [Admin]
      summary: List fee records
      responses:
        "200":
          description: Fees list
    post:
      tags: [Admin]
      summary: Create fee record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, amount, dueDate]
              properties:
                userId:
                  type: string
                  format: uuid
                  example: 22222222-2222-2222-2222-222222222222
                amount:
                  type: number
                  example: 1500
                dueDate:
                  type: string
                  format: date
                  example: 2026-05-15
      responses:
        "201":
          description: Fee created

  /api/v1/admin/books:
    get:
      tags: [Admin]
      summary: List books
      responses:
        "200":
          description: Books list
    post:
      tags: [Admin]
      summary: Add book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, isbn, author, totalCopies]
              properties:
                title:
                  type: string
                  example: Database Systems
                isbn:
                  type: string
                  example: 9780132143190
                author:
                  type: string
                  example: Abraham Silberschatz
                totalCopies:
                  type: integer
                  example: 10
      responses:
        "201":
          description: Book created

  /api/v1/admin/audit:
    get:
      tags: [Admin]
      summary: Audit log list
      responses:
        "200":
          description: Audit logs

  /api/v1/admin/files/import:
    post:
      tags: [Admin]
      summary: Import data file
      requestBody:
        required: true
                    example: student01
        content:
          multipart/form-data:
            schema:
                    example: student01@college.edu
              type: object
              required: [file]
                    example: "9876543210"
              properties:
                file:
                    example: Student@123
                  type: string
                  format: binary
      responses:
        "200":
          description: Import completed
                    example: [STUDENT]

  /api/v1/admin/files/export:
    get:
      tags: [Admin]
      summary: Export data file
                      example: STU-2026-001
      responses:
        "200":
          description: Export file stream
                      example: 11111111-1111-1111-1111-111111111111

  /api/v1/teacher/students:
                      example: John Doe
    get:
      tags: [Teacher]
      summary: List students accessible to teacher
      responses:
        "200":
                      example: TCH-2026-001
          description: Students list

                      example: Computer Science
  /api/v1/teacher/classrooms:
    get:
      tags: [Teacher]
      summary: List classrooms accessible to teacher
      responses:
        "200":
          description: Classrooms list

  /api/v1/teacher/subjects:
    get:
      tags: [Teacher]
      summary: List subjects accessible to teacher
      responses:
        "200":
          description: Subjects list

  /api/v1/teacher/attendance:
    get:
      tags: [Teacher]
      summary: View attendance records
      responses:
        "200":
          description: Attendance list
    post:
      tags: [Teacher]
      summary: Mark attendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [studentId, classRoomId, subjectId, date, status]
              properties:
                studentId:
                  type: string
                  format: uuid
                  example: 22222222-2222-2222-2222-222222222222
                classRoomId:
                  type: string
                  format: uuid
                  example: 11111111-1111-1111-1111-111111111111
                subjectId:
                  type: string
                  format: uuid
                  example: 33333333-3333-3333-3333-333333333333
                date:
                  type: string
                  format: date
                  example: 2026-04-28
                status:
                  type: string
                  example: PRESENT
      responses:
        "201":
          description: Attendance marked

  /api/v1/teacher/attendance/bulk:
    post:
      tags: [Teacher]
      summary: Bulk mark attendance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [attendance]
              properties:
                attendance:
                  type: array
                  items:
                    type: object
                    required: [studentId, classRoomId, subjectId, date, status]
                    properties:
                      studentId:
                        type: string
                        format: uuid
                      classRoomId:
                        type: string
                        format: uuid
                      subjectId:
                        type: string
                        format: uuid
                      date:
                        type: string
                        format: date
                      status:
                        type: string
      responses:
        "201":
          description: Attendance bulk created

  /api/v1/teacher/marks:
    get:
      tags: [Teacher]
      summary: View marks
      responses:
        "200":
          description: Marks list
    post:
      tags: [Teacher]
      summary: Create marks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [studentId, classRoomId, subjectId, examId, marks, maxMarks]
              properties:
                studentId:
                  type: string
                  format: uuid
                  example: 22222222-2222-2222-2222-222222222222
                classRoomId:
                  type: string
                  format: uuid
                  example: 11111111-1111-1111-1111-111111111111
                subjectId:
                  type: string
                  format: uuid
                  example: 33333333-3333-3333-3333-333333333333
                examId:
                  type: string
                  format: uuid
                  example: 44444444-4444-4444-4444-444444444444
                marks:
                  type: number
                  example: 78.5
                maxMarks:
                  type: number
                  example: 100
      responses:
        "201":
          description: Marks created

  /api/v1/teacher/exams:
    get:
      tags: [Teacher]
      summary: View exams
      responses:
        "200":
          description: Exams list
    post:
      tags: [Teacher]
      summary: Create exam entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, term, examDate]
              properties:
                name:
                  type: string
                  example: Unit Test 1
                term:
                  type: string
                  example: Term 1
                examDate:
                  type: string
                  format: date-time
                  example: 2026-05-20T09:00:00Z
      responses:
        "201":
          description: Exam created

  /api/v1/teacher/results:
    get:
      tags: [Teacher]
      summary: View results
      responses:
        "200":
          description: Results list

  /api/v1/student/attendance:
    get:
      tags: [Student]
      summary: View attendance records
      responses:
        "200":
          description: Attendance list

  /api/v1/student/marks:
    get:
      tags: [Student]
      summary: View marks records
      responses:
        "200":
          description: Marks list

  /api/v1/student/results:
    get:
      tags: [Student]
      summary: View results records
      responses:
        "200":
          description: Results list

  /api/v1/student/fees:
    get:
      tags: [Student]
      summary: View fee status
      responses:
        "200":
          description: Fee status

  /api/v1/student/books:
    get:
      tags: [Student]
      summary: Search library books
      responses:
        "200":
          description: Books list

  /api/v1/accountant/students:
    get:
      tags: [Accountant]
      summary: View students for billing workflows
      responses:
        "200":
          description: Students list

  /api/v1/accountant/fees:
    get:
      tags: [Accountant]
      summary: Payment history and dues list
      responses:
        "200":
          description: Fees list
    post:
      tags: [Accountant]
      summary: Create fee or invoice entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [studentId, amount, dueDate]
              properties:
                studentId:
                  type: string
                  format: uuid
                  example: 22222222-2222-2222-2222-222222222222
                amount:
                  type: number
                  example: 1500
                dueDate:
                  type: string
                  format: date
                  example: 2026-05-15
      responses:
        "201":
          description: Fee entry created

  /api/v1/accountant/files/import:
    post:
      tags: [Accountant]
      summary: Import financial data
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Import completed

  /api/v1/library/books:
    get:
      tags: [Library]
      summary: Search catalog
      responses:
        "200":
          description: Books list
    post:
      tags: [Library]
      summary: Add book to inventory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, isbn, author, totalCopies]
              properties:
                title:
                  type: string
                  example: Operating System Concepts
                isbn:
                  type: string
                  example: 9781118063330
                author:
                  type: string
                  example: Abraham Silberschatz
                totalCopies:
                  type: integer
                  example: 5
      responses:
        "201":
          description: Book created

  /api/v1/library/books/issue:
    post:
      tags: [Library]
      summary: Issue a book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bookId, userId, dueDate]
              properties:
                bookId:
                  type: string
                  format: uuid
                  example: 11111111-1111-1111-1111-111111111111
                userId:
                  type: string
                  format: uuid
                  example: 22222222-2222-2222-2222-222222222222
                dueDate:
                  type: string
                  format: date
                  example: 2026-05-15
      responses:
        "200":
          description: Book issued

  /api/v1/library/books/{bookIssueId}/return:
    post:
      tags: [Library]
      summary: Return a book
      parameters:
        - in: path
          name: bookIssueId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Book returned
