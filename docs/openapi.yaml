openapi: 3.0.3
info:
  title: College Management Backend API
  version: 2.0.0
  description: |
    Full API documentation for authentication, user administration, academic operations,
    finance, library workflows, audit logs, and file import/export.

    ## Router Headings
    - Admin Routes: `/api/v1/admin/...`
    - Student Routes: `/api/v1/student/...`
    - Teacher Routes: `/api/v1/teacher/...`
    - Accountant Routes: `/api/v1/accountant/...`
    - Library Routes: `/api/v1/library/...`

    Note: Role-based router paths are aliases over the same module endpoints and keep the same RBAC checks.
servers:
  - url: http://localhost:4000
    description: Local development

tags:
  - name: Admin Routes
    description: Alias route group for admin-facing modules under `/api/v1/admin/...`.
  - name: Student Routes
    description: Alias route group for student-facing modules under `/api/v1/student/...`.
  - name: Teacher Routes
    description: Alias route group for teacher-facing modules under `/api/v1/teacher/...`.
  - name: Accountant Routes
    description: Alias route group for accountant-facing modules under `/api/v1/accountant/...`.
  - name: Library Routes
    description: Alias route group for library-facing modules under `/api/v1/library/...`.
  - name: Health
  - name: Auth
  - name: Users
  - name: Profile
  - name: Students
  - name: Teachers
  - name: Classrooms
  - name: Subjects
  - name: Attendance
  - name: Marks
  - name: Exams
  - name: Results
  - name: Fees
  - name: Books
  - name: Audit
  - name: Files

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PageParam:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      in: query
      name: limit
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    SortOrderParam:
      in: query
      name: sortOrder
      schema:
        type: string
        enum: [asc, desc]

  schemas:
    ApiResponse:
      type: object
      properties:
        status:
          type: integer
          example: 200
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Request completed successfully
        data:
          nullable: true

    LoginBody:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: superadmin
        password:
          type: string
          example: SuperAdmin@123

    RefreshBody:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    ForgotPasswordBody:
      type: object
      required: [channel]
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
        channel:
          type: string
          enum: [EMAIL, SMS]

    VerifyOtpBody:
      type: object
      required: [otp, newPassword]
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
        otp:
          type: string
          example: "123456"
        newPassword:
          type: string
          example: NewStrongPassword@123

    ResetMyPasswordBody:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    CreateUserBody:
      type: object
      required: [username, password, roles]
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        password:
          type: string
        roles:
          type: array
          items:
            type: string
            enum: [SUPER_ADMIN, ADMIN, STUDENT, TEACHER, ACCOUNTANT, LIBRARY_STAFF]

    BlockUserBody:
      type: object
      required: [reason]
      properties:
        reason:
          type: string

    ToggleUserBlockBody:
      type: object
      properties:
        isBlocked:
          type: boolean
          description: Optional explicit state. If omitted, endpoint toggles current block state.
        reason:
          type: string
          description: Optional reason when blocking.

    ResetUserPasswordBody:
      type: object
      required: [newPassword]
      properties:
        newPassword:
          type: string

    CreateStudentBody:
      type: object
      required: [userId, rollNumber, classRoomId]
      properties:
        userId:
          type: string
          format: uuid
        rollNumber:
          type: string
        classRoomId:
          type: string
          format: uuid
        guardianName:
          type: string

    UpdateStudentBody:
      type: object
      properties:
        rollNumber:
          type: string
        classRoomId:
          type: string
          format: uuid
        guardianName:
          type: string

    CreateTeacherBody:
      type: object
      required: [userId, employeeId]
      properties:
        userId:
          type: string
          format: uuid
        employeeId:
          type: string
        department:
          type: string

    UpdateTeacherBody:
      type: object
      properties:
        employeeId:
          type: string
        department:
          type: string

    CreateClassroomBody:
      type: object
      required: [name, section]
      properties:
        name:
          type: string
        section:
          type: string

    UpdateClassroomBody:
      type: object
      properties:
        name:
          type: string
        section:
          type: string

    CreateSubjectBody:
      type: object
      required: [name, code]
      properties:
        name:
          type: string
        code:
          type: string

    UpdateSubjectBody:
      type: object
      properties:
        name:
          type: string
        code:
          type: string

    AttendanceStatus:
      type: string
      enum: [PRESENT, ABSENT, LEAVE, SICK]

    CreateAttendanceBody:
      type: object
      required: [studentId, classRoomId, subjectId, date, status]
      properties:
        studentId:
          type: string
          format: uuid
        classRoomId:
          type: string
          format: uuid
        subjectId:
          type: string
          format: uuid
        date:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/AttendanceStatus'

    BulkAttendanceBody:
      type: object
      required: [classRoomId, subjectId, date, attendance]
      properties:
        classRoomId:
          type: string
          format: uuid
        subjectId:
          type: string
          format: uuid
        date:
          type: string
          format: date-time
        attendance:
          type: array
          minItems: 1
          items:
            type: object
            required: [studentId, status]
            properties:
              studentId:
                type: string
                format: uuid
              status:
                $ref: '#/components/schemas/AttendanceStatus'

    UpdateAttendanceBody:
      type: object
      properties:
        status:
          $ref: '#/components/schemas/AttendanceStatus'
        date:
          type: string
          format: date-time

    CreateMarkBody:
      type: object
      required: [studentId, classRoomId, subjectId, examId, marks, maxMarks]
      properties:
        studentId:
          type: string
          format: uuid
        classRoomId:
          type: string
          format: uuid
        subjectId:
          type: string
          format: uuid
        examId:
          type: string
          format: uuid
        marks:
          type: number
          minimum: 0
        maxMarks:
          type: number
          minimum: 0

    BulkMarksBody:
      type: object
      required: [examId, subjectId, classRoomId, marks]
      properties:
        examId:
          type: string
          format: uuid
        subjectId:
          type: string
          format: uuid
        classRoomId:
          type: string
          format: uuid
        marks:
          type: array
          minItems: 1
          items:
            type: object
            required: [studentId, marks, maxMarks]
            properties:
              studentId:
                type: string
                format: uuid
              marks:
                type: number
                minimum: 0
              maxMarks:
                type: number
                minimum: 0

    UpdateMarkBody:
      type: object
      properties:
        marks:
          type: number
          minimum: 0
        maxMarks:
          type: number
          minimum: 0

    CreateExamBody:
      type: object
      required: [name, term, examDate]
      properties:
        name:
          type: string
        term:
          type: string
        examDate:
          type: string
          format: date-time

    UpdateExamBody:
      type: object
      properties:
        name:
          type: string
        term:
          type: string
        examDate:
          type: string
          format: date-time

    GenerateResultBody:
      type: object
      required: [studentId, examId]
      properties:
        studentId:
          type: string
          format: uuid
        examId:
          type: string
          format: uuid

    CreateFeeBody:
      type: object
      required: [userId, amount, dueDate]
      properties:
        userId:
          type: string
          format: uuid
        amount:
          type: number
          minimum: 0
        dueDate:
          type: string
          format: date-time
        description:
          type: string

    UpdateFeeBody:
      type: object
      properties:
        amount:
          type: number
          minimum: 0
        dueDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [PENDING, PAID, PARTIAL, OVERDUE]
        description:
          type: string

    MarkFeePaidBody:
      type: object
      required: [paidAmount]
      properties:
        paidAmount:
          type: number
          minimum: 0
        paymentMethod:
          type: string
          enum: [CASH, CHEQUE, ONLINE, BANK_TRANSFER]

    CreateBookBody:
      type: object
      required: [title, isbn, author, totalCopies]
      properties:
        title:
          type: string
        isbn:
          type: string
        author:
          type: string
        totalCopies:
          type: integer
          minimum: 1

    UpdateBookBody:
      type: object
      properties:
        title:
          type: string
        author:
          type: string
        totalCopies:
          type: integer
          minimum: 1

    IssueBookBody:
      type: object
      required: [bookId, userId, dueDate]
      properties:
        bookId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        dueDate:
          type: string
          format: date-time

    ReturnBookBody:
      type: object
      properties:
        fine:
          type: number
          minimum: 0

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

    /api/v1/admin/users:
      post:
        tags: [Admin Routes]
        summary: Admin alias - create user
        description: Alias of `/api/v1/users`.
        security:
          - bearerAuth: []
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUserBody'
        responses:
          '201':
            description: User created

    /api/v1/admin/users/{userId}/block-status:
      patch:
        tags: [Admin Routes]
        summary: Admin alias - set or toggle user block status
        description: Alias of `/api/v1/users/{userId}/block-status`.
        security:
          - bearerAuth: []
        parameters:
          - in: path
            name: userId
            required: true
            schema:
              type: string
              format: uuid
        requestBody:
          required: false
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToggleUserBlockBody'
        responses:
          '200':
            description: User block status updated

    /api/v1/student/profile/me:
      get:
        tags: [Student Routes]
        summary: Student alias - get own profile
        description: Alias of `/api/v1/profile/me`.
        security:
          - bearerAuth: []
        responses:
          '200':
            description: Profile fetched

    /api/v1/teacher/students:
      get:
        tags: [Teacher Routes]
        summary: Teacher alias - list students
        description: Alias of `/api/v1/students`.
        security:
          - bearerAuth: []
        parameters:
          - $ref: '#/components/parameters/PageParam'
          - $ref: '#/components/parameters/LimitParam'
          - in: query
            name: classRoomId
            schema:
              type: string
              format: uuid
          - in: query
            name: search
            schema:
              type: string
          - in: query
            name: sortBy
            schema:
              type: string
              enum: [rollNumber, createdAt]
          - $ref: '#/components/parameters/SortOrderParam'
        responses:
          '200':
            description: Students fetched

    /api/v1/accountant/fees:
      post:
        tags: [Accountant Routes]
        summary: Accountant alias - create fee record
        description: Alias of `/api/v1/fees`.
        security:
          - bearerAuth: []
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateFeeBody'
        responses:
          '201':
            description: Fee record created
      get:
        tags: [Accountant Routes]
        summary: Accountant alias - list fee records
        description: Alias of `/api/v1/fees`.
        security:
          - bearerAuth: []
        parameters:
          - $ref: '#/components/parameters/PageParam'
          - $ref: '#/components/parameters/LimitParam'
          - in: query
            name: userId
            schema:
              type: string
              format: uuid
          - in: query
            name: status
            schema:
              type: string
              enum: [PENDING, PAID, PARTIAL, OVERDUE]
          - in: query
            name: dateFrom
            schema:
              type: string
              format: date-time
          - in: query
            name: dateTo
            schema:
              type: string
              format: date-time
          - in: query
            name: sortBy
            schema:
              type: string
              enum: [dueDate, amount, status, createdAt]
          - $ref: '#/components/parameters/SortOrderParam'
        responses:
          '200':
            description: Fees fetched

    /api/v1/library/books:
      post:
        tags: [Library Routes]
        summary: Library alias - create book
        description: Alias of `/api/v1/books`.
        security:
          - bearerAuth: []
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateBookBody'
        responses:
          '201':
            description: Book created
      get:
        tags: [Library Routes]
        summary: Library alias - list books
        description: Alias of `/api/v1/books`.
        security:
          - bearerAuth: []
        parameters:
          - $ref: '#/components/parameters/PageParam'
          - $ref: '#/components/parameters/LimitParam'
          - in: query
            name: search
            schema:
              type: string
          - in: query
            name: author
            schema:
              type: string
          - in: query
            name: availableOnly
            schema:
              type: boolean
              default: false
          - in: query
            name: sortBy
            schema:
              type: string
              enum: [title, author, available, createdAt]
          - $ref: '#/components/parameters/SortOrderParam'
        responses:
          '200':
            description: Books fetched

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginBody'
      responses:
        '200':
          description: Login successful

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshBody'
      responses:
        '200':
          description: Token refreshed

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Logout and blacklist current access token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful

  /api/v1/auth/forgot-password/request-otp:
    post:
      tags: [Auth]
      summary: Request OTP for forgot password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordBody'
      responses:
        '200':
          description: OTP sent

  /api/v1/auth/forgot-password/verify-otp:
    post:
      tags: [Auth]
      summary: Verify OTP and reset password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOtpBody'
      responses:
        '200':
          description: Password reset successful

  /api/v1/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset own password
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetMyPasswordBody'
      responses:
        '200':
          description: Password reset successful

  /api/v1/users:
    post:
      tags: [Users]
      summary: Super admin creates a user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserBody'
      responses:
        '201':
          description: User created

  /api/v1/users/{userId}/block:
    patch:
      tags: [Users]
      summary: Block a user
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlockUserBody'
      responses:
        '200':
          description: User blocked

  /api/v1/users/{userId}/block-status:
    patch:
      tags: [Users]
      summary: Set or toggle user block status
      description: |
        Unified endpoint for block and unblock operations.
        - Send `isBlocked: true` to block
        - Send `isBlocked: false` to unblock
        - Omit `isBlocked` to toggle current state
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToggleUserBlockBody'
      responses:
        '200':
          description: User block status updated

  /api/v1/users/{userId}/unblock:
    patch:
      tags: [Users]
      summary: Unblock a user
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User unblocked

  /api/v1/users/{userId}/reset-password:
    patch:
      tags: [Users]
      summary: Force reset user password
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetUserPasswordBody'
      responses:
        '200':
          description: Password reset

  /api/v1/users/{userId}/grant-admin:
    patch:
      tags: [Users]
      summary: Grant admin role
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Admin granted

  /api/v1/users/{userId}/revoke-admin:
    patch:
      tags: [Users]
      summary: Revoke admin role
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Admin revoked

  /api/v1/profile/me:
    get:
      tags: [Profile]
      summary: Get logged-in user profile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile fetched

  /api/v1/students:
    post:
      tags: [Students]
      summary: Create student profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStudentBody'
      responses:
        '201':
          description: Student created
    get:
      tags: [Students]
      summary: List students
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - in: query
          name: classRoomId
          schema:
            type: string
            format: uuid
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [rollNumber, createdAt]
        - $ref: '#/components/parameters/SortOrderParam'
      responses:
        '200':
          description: Students fetched

  /api/v1/students/{studentId}:
    get:
      tags: [Students]
      summary: Get student by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: studentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Student fetched
    patch:
      tags: [Students]
      summary: Update student
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: studentId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStudentBody'
      responses:
        '200':
          description: Student updated
    delete:
      tags: [Students]
      summary: Delete student
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: studentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Student deleted

  /api/v1/teachers:
    post:
      tags: [Teachers]
      summary: Create teacher profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTeacherBody'
      responses:
        '201':
          description: Teacher created
    get:
      tags: [Teachers]
      summary: List teachers
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - in: query
          name: department
          schema:
            type: string
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [employeeId, createdAt]
        - $ref: '#/components/parameters/SortOrderParam'
      responses:
        '200':
          description: Teachers fetched

  /api/v1/teachers/{teacherId}:
    get:
      tags: [Teachers]
      summary: Get teacher by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: teacherId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Teacher fetched
    patch:
      tags: [Teachers]
      summary: Update teacher
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: teacherId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTeacherBody'
      responses:
        '200':
          description: Teacher updated
    delete:
      tags: [Teachers]
      summary: Delete teacher
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: teacherId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Teacher deleted

  /api/v1/classrooms:
    post:
      tags: [Classrooms]
      summary: Create classroom
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClassroomBody'
      responses:
        '201':
          description: Classroom created
